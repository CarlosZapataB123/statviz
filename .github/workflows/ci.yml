name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pruebas:
    name: Pruebas e integridad del bundle
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar la batería de pruebas
        run: node tests/run-all.mjs

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Construir la vista previa de archivo único
        run: python3 build_preview.py

      - name: Verificar la integridad del bundle
        run: node scripts/check-bundle.mjs
