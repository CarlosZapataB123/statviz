<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatViz Universe — Visualización estadística con rigor</title>
    <meta
      name="description"
      content="Catálogo de más de 70 gráficos estadísticos en nueve categorías. Qué gráfico usar, cómo se construye, qué muestra y cómo se interpreta."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fafbfc" />

    <!-- Tipografía: superfamilia IBM Plex (Sans · Mono · Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,500;0,600;1,500;1,600&display=swap"
      rel="stylesheet"
    />

    <!-- Hoja de estilos: tokens → base → layout → componentes → animaciones → temas -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/themes/light.css" />
    <link rel="stylesheet" href="css/themes/dark.css" />
    <link rel="stylesheet" href="css/themes/universe.css" />
  </head>
  <body>
    <a class="skip-link" href="#workspace">Saltar al contenido</a>
    <!-- Capa de fondo cósmico (solo visible en el tema Universo) -->
    <div class="universe-bg" aria-hidden="true">
      <canvas class="universe-bg__stars" id="universe-stars"></canvas>
    </div>

    <!-- Shell de la aplicación -->
    <div class="app" id="app" data-sidebar="" data-inspector="">
      <!-- Barra superior -->
      <header class="topbar">
        <button
          id="btn-menu"
          class="icon-btn only-mobile"
          type="button"
          aria-label="Abrir el catálogo"
          title="Catálogo"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <a class="wordmark" href="./" aria-label="StatViz Universe, inicio">
          <span class="wordmark__glyph">&Sigma;</span>
          <span class="wordmark__name">StatViz</span>
          <span class="wordmark__sub">universe</span>
        </a>

        <div class="topbar__spacer"></div>

        <button id="btn-recommend" class="btn btn--sm btn--ghost" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16"
               fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M12 3l2.1 4.9L19 9l-4 3.4L16.2 18 12 15.3 7.8 18 9 12.4 5 9l4.9-1.1z" />
          </svg>
          <span>Recomendar</span>
        </button>

        <button id="btn-load-data" class="btn btn--sm btn--ghost" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16"
               fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M12 15V4M12 4l-3.5 3.5M12 4l3.5 3.5" />
            <path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" />
          </svg>
          <span>Cargar datos</span>
        </button>

        <button id="btn-export" class="btn btn--sm btn--ghost" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16"
               fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M12 4v11M12 4l-3.5 3.5M12 4l3.5 3.5" transform="rotate(180 12 9.5)" />
            <path d="M4 14v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" />
          </svg>
          <span>Exportar</span>
        </button>

        <div class="topbar__divider"></div>

        <div
          id="theme-switch"
          class="theme-switch"
          role="group"
          aria-label="Tema visual"
        >
          <button
            class="theme-switch__btn"
            data-theme-value="light"
            type="button"
            aria-pressed="false"
            aria-label="Tema claro"
            title="Claro"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
          </button>
          <button
            class="theme-switch__btn"
            data-theme-value="dark"
            type="button"
            aria-pressed="false"
            aria-label="Tema oscuro"
            title="Oscuro"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.8A8 8 0 1 1 11.2 3a6.4 6.4 0 0 0 9.8 9.8z" />
            </svg>
          </button>
          <button
            class="theme-switch__btn"
            data-theme-value="universe"
            type="button"
            aria-pressed="false"
            aria-label="Tema Universo"
            title="Universo"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z" />
              <circle cx="18" cy="17" r="1.2" />
              <circle cx="6.5" cy="16" r="0.9" />
            </svg>
          </button>
        </div>

        <div class="topbar__divider"></div>

        <button
          id="btn-inspector"
          class="icon-btn"
          type="button"
          aria-label="Mostrar u ocultar el inspector"
          title="Inspector"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2" />
            <path d="M15 4v16" />
          </svg>
        </button>
      </header>

      <!-- Catálogo (barra lateral) -->
      <aside class="sidebar" id="sidebar" aria-label="Catálogo de gráficos">
        <div class="sidebar__head">
          <div class="search">
            <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4.3-4.3" />
            </svg>
            <input
              id="catalog-search"
              class="search__input"
              type="search"
              placeholder="Buscar gráfico…"
              aria-label="Buscar en el catálogo"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <p class="eyebrow sidebar__count"><span id="catalog-count"></span></p>
        </div>
        <div class="sidebar__scroll">
          <nav id="catalog-list" aria-label="Gráficos por categoría"></nav>
        </div>
      </aside>

      <!-- Lienzo -->
      <main class="workspace" id="workspace" tabindex="-1" aria-label="Lienzo de trabajo">
        <div class="workspace__inner" id="workspace-inner"></div>
      </main>

      <!-- Inspector -->
      <aside class="inspector" id="inspector" aria-label="Inspector">
        <div class="inspector__head">
          <div class="tabs" id="inspector-tabs" role="tablist" aria-label="Secciones del inspector">
            <button class="tabs__btn" type="button" data-tab="config" role="tab" aria-selected="true">
              Configuración
            </button>
            <button class="tabs__btn" type="button" data-tab="interpretation" role="tab" aria-selected="false">
              Interpretación
            </button>
          </div>
        </div>
        <div class="inspector__scroll" id="inspector-panel"></div>
      </aside>

      <!-- Barra de estado -->
      <footer class="statusbar" aria-label="Estado de los datos">
        <span class="status-item">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-item__key">datos</span>
          <span class="status-item__val" id="status-source">sin datos</span>
        </span>
        <span class="status-item">
          <span class="status-item__key">n</span>
          <span class="status-item__val" id="status-n">—</span>
        </span>
        <span class="status-item">
          <span class="status-item__key">variables</span>
          <span class="status-item__val" id="status-vars">—</span>
        </span>
        <span class="status-spacer"></span>
        <span class="status-item">
          <span class="status-item__val">StatViz Universe · v1.0</span>
        </span>
      </footer>
    </div>

    <!-- Velo para overlays en pantallas estrechas -->
    <div class="scrim" id="scrim" data-visible="false" aria-hidden="true"></div>

    <!-- Aplicación (ES Modules nativos: sin paso de compilación) -->
    <script type="module" src="js/core/app.js"></script>
  </body>
</html>
